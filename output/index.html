<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パーソナル図解 — 一覧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ads: {
              bg: '#FFFFFF',
              surface: '#F8FAFC',
              border: '#E2E8F0',
              accent: '#3B82F6',
              text: '#1E293B',
              muted: '#64748B',
              dim: '#94A3B8',
            }
          },
          fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] },
        }
      }
    }
  </script>
</head>
<body class="bg-ads-bg text-slate-600 antialiased border-t-4 border-blue-500">
  <main class="max-w-3xl mx-auto px-5 py-12 md:py-16">
    <h1 class="text-2xl md:text-3xl font-bold text-ads-text mb-2">パーソナル図解</h1>
    <p class="text-ads-muted mb-10 leading-relaxed">
      このサイトは <code class="text-sm bg-ads-surface px-1.5 py-0.5 rounded border border-ads-border">output/</code> を GitHub Pages で公開したときの入口です。新しい図解を追加したら push すると URL からも見られます。
    </p>
    <ul class="space-y-4">
      <li>
        <a href="renovation-intro.html" class="group block rounded-2xl border border-ads-border bg-ads-surface p-5 hover:border-blue-300 hover:shadow-sm transition-all">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-lg font-bold text-ads-text group-hover:text-blue-600">窓・ドアリフォーム：制度の読み方（サンプル）</h2>
              <p class="text-sm text-ads-muted mt-1">ADS仲間向けの図解スキルのデモ。助成金の文章を図で整理するイメージ。</p>
            </div>
            <span class="text-blue-500 text-sm font-medium flex-shrink-0 mt-1">開く →</span>
          </div>
        </a>
      </li>
    </ul>
    <p class="text-xs text-ads-dim mt-12 border-t border-ads-border pt-6">
      ローカル確認: このフォルダを開くか <code class="bg-ads-surface px-1 rounded">npx serve output</code> などでホストしてください。
    </p>
  </main>
</body>
</html>
